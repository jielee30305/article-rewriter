<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>公众号改写工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:40px 30px;width:100%;max-width:380px;box-shadow:0 2px 16px rgba(0,0,0,.08);text-align:center}
h1{font-size:1.4rem;color:#333;margin-bottom:8px}
.sub{font-size:0.85rem;color:#999;margin-bottom:28px}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:1rem;text-align:center;outline:none;transition:border-color .2s}
input[type=password]:focus{border-color:#6C5CE7}
.btn{width:100%;padding:12px;background:#6C5CE7;color:#fff;border:none;border-radius:10px;font-size:1rem;margin-top:16px;cursor:pointer;transition:background .2s}
.btn:hover{background:#5B4BD5}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err{color:#e74c3c;font-size:0.85rem;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 公众号改写工具</h1>
  <p class="sub">请输入访问密码</p>
  <input type="password" id="pw" placeholder="密码" maxlength="50" autofocus>
  <button class="btn" id="btn" onclick="login()">进入</button>
  <div class="err" id="err">密码错误</div>
</div>
<script>
async function login() {
  const pw = document.getElementById("pw").value;
  if (!pw) return;
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "验证中…";
  try {
    const r = await fetch("/api/auth/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({password: pw})
    });
    if (r.ok) { location.href = "/"; }
    else { document.getElementById("err").style.display = "block"; }
  } catch(e) { document.getElementById("err").style.display = "block"; }
  btn.disabled = false;
  btn.textContent = "进入";
}
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
// 已登录则直接跳转
fetch("/api/auth/check").then(r => r.json()).then(d => { if (d.ok) location.href = "/"; });
</script>
</body>
</html>
