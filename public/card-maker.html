<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字卡片</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --card-w: 1080px;
    --card-h: 1440px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
    display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 24px;
  }

  .toolbar {
    position: sticky; top: 10px; z-index: 10;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    background: #2a2a2a; padding: 14px 18px; border-radius: 10px;
  }
  .toolbar label { color: #aaa; font-size: 13px; }
  .toolbar select, .toolbar input[type=color] {
    background: #333; color: #ddd; border: 1px solid #444; border-radius: 6px; padding: 6px 10px; font-size: 13px;
  }
  .toolbar input[type=color] { width: 36px; height: 32px; padding: 2px; cursor: pointer; }
  .toolbar button {
    background: #c9a96e; color: #1a1a1a; border: none; border-radius: 6px;
    padding: 8px 18px; font-size: 13px; font-weight: bold; cursor: pointer;
  }
  .toolbar button:hover { background: #b8995e; }

  .card {
    width: var(--card-w); height: var(--card-h);
    background: #1c1c1c;
    color: #e0d5c0;
    padding: 120px 100px;
    display: flex; flex-direction: column; justify-content: center;
    letter-spacing: 0.04em;
    line-height: 2.15;
    font-size: 30px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,255,240,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .card p { margin-bottom: 0.6em; text-indent: 0; position: relative; z-index: 1; }
  .card .gap { height: 1em; }
  .card .author {
    margin-top: 2em; font-size: 16px; color: #8a8070;
    letter-spacing: 0.08em;
  }
  .card .signature {
    position: absolute; bottom: 60px; right: 80px;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 15px; color: rgba(200,190,170,0.4);
    letter-spacing: 0.12em; font-style: italic;
    z-index: 1;
  }
  .card.ink .signature { color: rgba(100,90,70,0.25); }

  .card .title {
    font-size: 17px; color: #8a8070; letter-spacing: 0.1em;
    margin-bottom: 2.5em; border-left: 2px solid #c9a96e; padding-left: 14px;
  }
  .card.ts-s .title { font-size: 14px; }
  .card.ts-m .title { font-size: 17px; }
  .card.ts-l .title { font-size: 22px; }

  .card.dark  { background: #1c1c1c; color: #e0d5c0; }
  .card.warm  { background: #2a2218; color: #d4c5a9; }
  .card.cool  { background: #1a2022; color: #c5d0d4; }
  .card.ink   { background: #f5f0e8; color: #2a2218; }
  .card.ink::before { background: radial-gradient(ellipse at 30% 20%, rgba(0,0,0,0.02) 0%, transparent 60%); }

  .card.small  { font-size: 24px; padding: 90px 80px; }
  .card.medium { font-size: 30px; padding: 120px 100px; }
  .card.large  { font-size: 36px; padding: 140px 110px; }

  #textInput {
    width: var(--card-w); min-height: 260px;
    background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 8px;
    padding: 18px; font-size: 15px; font-family: inherit; line-height: 1.8; resize: vertical;
  }

  .preview-label { color: #888; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="toolbar">
  <label>画布</label>
  <select id="ratioSelect" onchange="updateRatio()">
    <option value="3:4">3:4 小红书/微头条</option>
    <option value="2:3">2:3 竖版</option>
    <option value="9:16">9:16 全屏</option>
  </select>
  <label>底色</label>
  <select id="bgSelect" onchange="updateCard()">
    <option value="dark">暗黑</option>
    <option value="warm">暖褐</option>
    <option value="cool">冷灰</option>
    <option value="ink" selected>浅纸</option>
  </select>
  <label>正文字号</label>
  <select id="sizeSelect" onchange="updateCard()">
    <option value="small">小</option>
    <option value="medium" selected>中</option>
    <option value="large">大</option>
  </select>
  <label>标题大小</label>
  <select id="titleSizeSelect" onchange="updateCard()">
    <option value="ts-s">小</option>
    <option value="ts-m" selected>中</option>
    <option value="ts-l">大</option>
  </select>
  <button onclick="downloadCard()">下载 PNG</button>
</div>

<div class="preview-label">▼ 预览</div>

<div id="card" class="card ink medium">
  <div class="title">入秋的河</div>
  <p>入秋的河落了水，浅滩上露着青灰的石头，风卷着狗尾草的白絮往人脸上飘。</p>
  <p>杂货铺的王哥每天清早都要拍紫砂盆里开的菊，炖的萝卜排骨汤，发去朋友圈，配的字总带个笑的表情。洗得笔挺的衬衫永远穿得齐整，领口的磨毛处都用同色线补得看不见印子。</p>
  <p>此刻他蹲在河岸边抽五块钱的烟，屏幕上亮着儿子发来的研究生学费催缴通知，亮了又暗。</p>
  <p>河面上渔人的橹声晃过来，他把烟蒂按进湿泥里，起身拍了拍裤脚沾的草屑，背挺得笔直，往亮着暖黄灯光的家走。</p>
  <div class="signature">J.LEE</div>
</div>

<div class="preview-label">▼ 粘贴你的文字，一行一段，自动分段</div>
<textarea id="textInput" placeholder="在此粘贴文字..."></textarea>

<script>
const card = document.getElementById('card');
const textInput = document.getElementById('textInput');
const bgSelect = document.getElementById('bgSelect');
const sizeSelect = document.getElementById('sizeSelect');
const titleSizeSelect = document.getElementById('titleSizeSelect');
const ratioSelect = document.getElementById('ratioSelect');

const SIZES = {
  '3:4': { w: 1080, h: 1440 },
  '2:3': { w: 1080, h: 1620 },
  '9:16': { w: 1080, h: 1920 },
};

function updateRatio() {
  const s = SIZES[ratioSelect.value];
  document.documentElement.style.setProperty('--card-w', s.w + 'px');
  document.documentElement.style.setProperty('--card-h', s.h + 'px');
}

updateRatio();

textInput.addEventListener('input', () => {
  const lines = textInput.value.split('\n').filter(l => l.trim());
  if (lines.length < 3) return;
  const title = lines[0].length < 15 ? lines[0] : '';
  const body = title ? lines.slice(1) : lines;
  card.innerHTML = (title ? `<div class="title">${title}</div>` : '') +
    body.map(l => l.trim() ? `<p>${l}</p>` : `<div class="gap"></div>`).join('') +
    '<div class="signature">J.LEE</div>';
  updateCard();
});

function updateCard() {
  card.className = 'card ' + bgSelect.value + ' ' + sizeSelect.value + ' ' + titleSizeSelect.value;
}

function downloadCard() {
  html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
    const a = document.createElement('a');
    a.download = '文字卡片.png';
    a.href = canvas.toDataURL();
    a.click();
  });
}
</script>
</body>
</html>
